name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["ML Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: datapipeline-autopilot

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/datapipeline-autopilot/pipeline-autopilot:${{ github.sha }} \
            -t gcr.io/datapipeline-autopilot/pipeline-autopilot:latest \
            -f Dockerfile.app .

      - name: Push Docker image
        run: |
          docker push gcr.io/datapipeline-autopilot/pipeline-autopilot:${{ github.sha }}
          docker push gcr.io/datapipeline-autopilot/pipeline-autopilot:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pipeline-autopilot \
            --image=gcr.io/datapipeline-autopilot/pipeline-autopilot:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=60 \
            --quiet

      - name: Get Live URL
        run: |
          URL=$(gcloud run services describe pipeline-autopilot \
            --region=us-central1 \
            --format='value(status.url)')
          echo "✅ Live endpoint: $URL"

      - name: Smoke test
        run: |
          sleep 10
          curl -f "$URL/health" | python3 -m json.tool