name: ML Pipeline - Test Suite

on:
  push:
    branches:
      - model-dev
      - member6-assignment2
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run unit tests
        run: |
          pytest tests/test_model_training.py -v
          pytest tests/test_model_validation.py -v
          pytest tests/test_model_bias.py -v
      
      - name: Test results
        if: success()
        run: echo "✅ All tests passed!"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Notify success
        if: needs.test.result == 'success'
        run: |
          echo "✅ Pipeline SUCCESS - All tests passed!"
          echo "Model scripts validated and ready for training"
      
      - name: Notify failure
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Pipeline FAILED - Check test results"
          exit 1